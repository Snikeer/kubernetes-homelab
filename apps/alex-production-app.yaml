apiVersion: apps/v1
kind: Deployment
metadata:
  name: banktech-frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banktech-frontend
  template:
    metadata:
      labels:
        app: banktech-frontend
    spec:
      containers:
        - name: web-server
          image: nginx:alpine
          ports:
            - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: banktech-service
  namespace: default
spec:
  selector:
    app: banktech-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
